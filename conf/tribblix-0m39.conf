
VM_RELEASE=0m39

VM_ISO_LINK="https://iso.tribblix.org/iso/tribblix-0m39.iso"
VM_OS_NAME="tribblix"
# No Tribblix-specific libvirt os-variant; `openindiana` is the closest
# illumos sibling and works for the VM defaults we need.
VM_OS_TYPE="openindiana"
VM_SSH_PORT=2229


# Root password on the live ISO (and inherited by the installed system
# until the user changes it).
VM_ROOT_PASSWORD=tribblix

VM_SHUTDOWN_CMD="/usr/sbin/poweroff"

# Tribblix ships `zap` as its package manager.
VM_INSTALL_CMD="zap install "

# VM_RSYNC_PKG / VM_SSHFS_PKG both empty → build.sh's final verification
# block skips. That block does `ssh $osname mkdir -p $HOME/work`, and on
# illumos/Tribblix `/home` is auto_home, so literal mkdir inside it fails
# with "Operation not applicable" regardless of permissions. The
# verification is only a post-export sanity check; we still install
# rsync/tree through VM_PRE_INSTALL_PKGS below.
VM_RSYNC_PKG="rsync"
VM_SSHFS_PKG=""

VM_PRE_INSTALL_PKGS="tree rsync"

# Getty prints "tribblix console login:" on the installed system and
# "tribblix login:" on live.
VM_LOGIN_TAG="login:"


# SATA gives predictable c1t0d0 device naming on illumos; virtio-blk
# enumerates differently and installOpts.sh hard-codes the target.
VM_DISK=sata
VM_NIC=e1000

VM_OPTS="conf/tribblix-0m39.resp"

VM_VBOX="./vbox.sh"

VM_VBOX_LINK="https://raw.githubusercontent.com/anyvm-org/vbox/v1.2.4/vbox.sh"
